<div class="main-container">
  <nz-splitter>
    <nz-splitter-panel>
      <div class="button-group">
        <button nz-button nzBlock (click)="func = Functions.StaffManager">
          Személyzetkezelő
        </button>
        <button nz-button nzBlock (click)="func = Functions.CreateMission">
          Új küldetés
        </button>
        <button nz-button nzBlock (click)="func = Functions.AssignMissions">
          Küldetések kiosztása
        </button>
        <button nz-button nzBlock (click)="func = Functions.MissionManager">
          Küldetésvezérlő
        </button>
      </div>
    </nz-splitter-panel>
    <nz-splitter-panel>
      <div class="content-area">
        @switch (func) {
          @case (Functions.StaffManager) {
            <app-staff-manager></app-staff-manager>
          }
          @case (Functions.CreateMission) {
            <app-create-mission></app-create-mission>
          }
          @case (Functions.AssignMissions) {
            <app-assign-missions></app-assign-missions>
          }
          @case (Functions.MissionManager) {
            <app-mission-manager></app-mission-manager>
          }
          @default {
            <p>Kérjük, válasszon a bal oldali menüből a kezdéshez!</p>
          }
        }
      </div>
    </nz-splitter-panel>
  </nz-splitter>
</div>
